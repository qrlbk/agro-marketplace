name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-unit:
    name: Backend (unit)
    runs-on: ubuntu-latest
    env:
      STAFF_JWT_SECRET: ci-staff-secret
      JWT_SECRET: ci-jwt-secret
      WEBHOOK_1C_API_KEY: ci-webhook-key
      LLM_FEATURES_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Security (pip-audit)
        run: |
          cd backend
          pip install pip-audit
          pip-audit -r requirements.txt
      - name: Security (Bandit)
        run: |
          cd backend
          pip install bandit
          bandit -r app -ll -c bandit.yaml
      - name: Run unit tests
        run: |
          cd backend
          pytest tests/ -v -m unit --cov=app --cov-report=term-missing --cov-fail-under=0

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Security (npm audit)
        run: |
          cd frontend
          npm audit --audit-level=high
      - name: Build
        run: |
          cd frontend
          npm run build
      - name: Run tests
        run: |
          cd frontend
          npm run test:run
